appId: com.pesadeproductos.app
productName: PesaDeProductos
copyright: Copyright © 2024

directories:
  output: release
  buildResources: build

files:
  - dist/**/*
  - dist-electron/**/*

extraResources:
  - from: electron/database/schema.sql
    to: electron/database/schema.sql
  - from: electron/database/seed.sql
    to: electron/database/seed.sql

asarUnpack:
  - "node_modules/serialport/**/*"
  - "node_modules/@serialport/**/*"
  - "node_modules/pg/**/*"
  - "node_modules/pg-native/**/*"

npmRebuild: true

win:
  target:
    - target: nsis
      arch: [x64]
    - target: portable
      arch: [x64]
  icon: build/icon.ico
  requestedExecutionLevel: asInvoker

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  allowElevation: true
  language: 3082

portable:
  artifactName: PesaDeProductos-portable.exe
