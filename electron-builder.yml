appId: com.pesadeproductos.app
productName: PesaDeProductos
copyright: Copyright © 2024

directories:
  output: release
  buildResources: build

files:
  - dist/**/*
  - dist-electron/**/*

extraResources:
  - from: electron/database/schema.sql
    to: electron/database/schema.sql
  - from: electron/database/seed.sql
    to: electron/database/seed.sql

asarUnpack:
  - "node_modules/serialport/**/*"
  - "node_modules/@serialport/**/*"
  - "node_modules/pg/**/*"
  - "node_modules/pg-native/**/*"

npmRebuild: true

win:
  target:
    - nsis
  icon: build/icon.ico

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerLanguages:
    - es_MX
  language: 3082
